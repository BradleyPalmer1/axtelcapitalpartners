<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Axtel Capital Partners</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#00142f;
}

.desktop{
    display:block;
    width:100%;
    height:auto;
}

.mobile{
    display:none;
    width:100%;
    height:auto;
}

@media only screen and (max-width:768px){

    .desktop{
        display:none;
    }

    .mobile{
        display:block;
    }
}
</style>
</head>

<body>

<img class="desktop"
     src="landing-page.webp"
     alt="Axtel Capital Partners">

<img class="mobile"
     src="mobile-landing-page.png"
     alt="Axtel Capital Partners">

</body>
</html>
